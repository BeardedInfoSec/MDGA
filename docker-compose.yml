services:
  mysql:
    image: mysql:8.0
    container_name: mdga-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: "mdga_core-xTa5dfGz"
      MYSQL_USER: "mdga_core-WgzdgJqd"
      MYSQL_PASSWORD: gv4sLg7qRbe1tCxE7y9iCAoXP
    ports:
      - "3306:3306"
    volumes:
      - mdga_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mdga_mysql_data:
