# ================================================
# MDGA — Local development stack
#   docker compose up -d   → MySQL + app, schema + migrations auto-loaded
#   docker compose logs -f → tail
#   docker compose down    → stop (data persists in named volumes)
#   docker compose down -v → stop AND wipe DB / uploads
#
# After `up`, the site is at  http://localhost:3000
# Admin login defaults from schema.sql seed: see db/schema.sql for creds
#
# Required env vars (export before `up`, or put in a .env file beside this):
#   JWT_SECRET                 → any long random string for dev
#   BLIZZARD_CLIENT_ID         → optional; only needed for character lookup
#   BLIZZARD_CLIENT_SECRET     → optional
#   DISCORD_BOT_TOKEN          → optional; needed for the Discord bot
# ================================================

services:
  mysql:
    image: mysql:8.0
    container_name: mdga-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mdga_dev
      MYSQL_USER: mdga
      MYSQL_PASSWORD: mdga_dev_password
    ports:
      - "3306:3306"
    volumes:
      - mdga_mysql_data:/var/lib/mysql
      # First-boot init: docker-init.sh runs schema.sql then every migration in order.
      # The script reads from /docker-entrypoint-initdb.d/db-source/ (mounted below).
      - ./db/docker-init.sh:/docker-entrypoint-initdb.d/00-mdga-init.sh:ro
      - ./db:/docker-entrypoint-initdb.d/db-source:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  app:
    build: .
    container_name: mdga-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mdga
      DB_PASSWORD: mdga_dev_password
      DB_NAME: mdga_dev
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-to-32+chars}
      BLIZZARD_CLIENT_ID: ${BLIZZARD_CLIENT_ID:-}
      BLIZZARD_CLIENT_SECRET: ${BLIZZARD_CLIENT_SECRET:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      ALLOWED_REALMS: ${ALLOWED_REALMS:-}
    ports:
      - "3000:3000"
    volumes:
      - mdga_uploads:/app/uploads
      - mdga_logs:/app/logs

volumes:
  mdga_mysql_data:
  mdga_uploads:
  mdga_logs:
